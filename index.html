<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContestMaster | Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: #f4f7f6;
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        /* This ensures that when we remove .hidden, the flex or block layout works immediately */
        #admin-rights-section.hidden {
            display: none !important;
        }

        #admin-rights-section {
            display: block; /* Ensures it uses block layout when .hidden is removed */
        }

        .hidden {
            display: none !important;
        }
        /* Admin Management Card Styling */
        .admin-only-card {
            border-top: 4px solid #dc3545 !important;
            background-color: #fff;
        }

        .admin-only {
            border: 2px solid #ffc107 !important; /* Yellow border for admin view on cards */
            transition: all 0.2s ease-in-out;
        }

            .admin-only:hover {
                box-shadow: 0 8px 24px rgba(220, 53, 69, 0.15);
            }

        .badge-admin {
            background: #f8f9fa;
            color: #333;
            border: 1px solid #dee2e6;
        }

        /* Ensure the table looks clean */
        .table code {
            font-size: 0.9rem;
            background: #fee2e2;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .delete-btn {
            color: #ef4444;
            cursor: pointer;
            padding: 5px;
            font-size: 1.1rem;
        }

            .delete-btn:hover {
                color: #b91c1c;
                transform: scale(1.2);
            }

        .hidden {
            display: none !important;
        }
        .btn-indigo {
            background: #4f46e5;
            color: white;
        }

            .btn-indigo:hover {
                background: #4338ca;
                color: white;
            }

    </style>
</head>
<body>
    <nav class="navbar navbar-white bg-white shadow-sm py-3 mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="#"><i class="fas fa-trophy me-2"></i>ContestMaster</a>
            <div id="nav-user" class="ms-auto d-flex align-items-center"></div>
        </div>
    </nav>

    <div class="container">
        <div id="auth-section" class="row justify-content-center mb-5">
            <div class="col-md-5">
                <div class="card p-4">
                    <div id="login-box">
                        <h5 class="fw-bold mb-4 text-center">Sign In</h5>
                        <input type="text" id="l-user" class="form-control mb-2" placeholder="Username">
                        <input type="password" id="l-pass" class="form-control mb-3" placeholder="Password">
                        <button onclick="handleAuth('login')" class="btn btn-indigo w-100">Login</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="admin-rights-section" class="mb-5 hidden">
            <div class="card admin-only-card p-4 shadow-sm" style="min-height: 100px;">
                <h5 class="fw-bold text-danger mb-4">
                    <i class="fas fa-user-shield me-2"></i>Admin Database Management
                </h5>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr class="small text-muted">
                                <th>Database ID</th>
                                <th>Contest Title</th>
                                <th class="text-end">Action</th>
                            </tr>
                        </thead>
                        <tbody id="admin-contest-list">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="mb-5">
            <h5 class="fw-bold mb-3"><i class="fas fa-list text-primary me-2"></i>Current Competitions</h5>
            <div id="contest-grid" class="row g-3"></div>
        </div>

        <div id="dashboard" class="row hidden g-4 mb-5">
            <div class="col-md-4">
                <div class="card p-4 h-100">
                    <h6 class="fw-bold text-warning mb-3"><i class="fas fa-crown me-2"></i>Leaderboard</h6>
                    <div id="leaderboard-data"></div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card p-4 h-100">
                    <h6 class="fw-bold text-success mb-3"><i class="fas fa-history me-2"></i>My History</h6>
                    <table class="table">
                        <thead>
                            <tr class="small text-muted">
                                <th>Contest</th>
                                <th>Score</th>
                                <th>Prize</th>
                            </tr>
                        </thead>
                        <tbody id="history-data"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
  
    <div class="modal fade" id="qModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content card p-4">
                <h5 id="qTitle" class="fw-bold mb-3"></h5>
                <div id="qList"></div>
                <button onclick="submitAnswers()" class="btn btn-indigo mt-3">Submit All Answers</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
